services:
  - type: web
    name: trademind-agent
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py --mode agent"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: TRADING_MODE
        value: paper
      - key: TOTAL_CAPITAL
        value: 3000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
